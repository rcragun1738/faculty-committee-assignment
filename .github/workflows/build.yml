name: Build Installers

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential libssl-dev libffi-dev python3

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Build installers
        run: npx electron-builder --linux --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            dist/*.AppImage
            dist/*.deb

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Build installers
        run: npx electron-builder --win --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: dist/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Build installers
        run: npx electron-builder --mac --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: mac-installers
          path: |
            dist/*.dmg
            dist/*.zip

  # After all three platforms build successfully, gather the installers and
  # publish them as a GitHub Release so they appear on the repo's "Releases"
  # page — a permanent, easy-to-find download spot for colleagues.
  release:
    needs: [build-linux, build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required for the workflow to create/update a Release
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-build${{ github.run_number }}
          name: Faculty Committee Assignment (build ${{ github.run_number }})
          body: |
            Installers for Windows, macOS, and Linux.

            - **Windows:** download the `.exe`, double-click to install.
            - **macOS:** download the `.dmg`; the first time, right-click the app and choose **Open**.
            - **Linux:** download the `.AppImage` (portable) or `.deb` (Debian/Ubuntu).
          make_latest: true
          files: artifacts/**/*
