name: Build Installers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev libffi-dev python3
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --linux
      - uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            dist/*.AppImage
            dist/*.deb

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --win
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            dist/*.msi
            dist/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --mac
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installers
          path: |
            dist/*.dmg
            dist/*.zip
